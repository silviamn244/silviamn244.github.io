<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silvia Body System</title>

  <link rel="stylesheet" href="style.css">

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    /* ================= NAVBAR PREMIUM (MISMO ESTILO) ================= */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 15px 5%;

      background: rgba(10,10,10,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      border-bottom: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s ease;
    }

    .nav:hover {
      background: rgba(10,10,10,0.85);
    }

    .nav strong {
      font-size: 16px;
      letter-spacing: 1px;
      color: white;
    }

    .nav div:last-child {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 10px;
      border-radius: 8px;
      transition: 0.3s ease;
      position: relative;
    }

    .nav a:hover {
      color: white;
      background: rgba(255,154,31,0.15);
      transform: translateY(-2px);
    }

    .nav a::after {
      content: "";
      position: absolute;
      bottom: 4px;
      left: 50%;
      width: 0%;
      height: 2px;
      background: #ff9a1f;
      transition: 0.3s;
      transform: translateX(-50%);
    }

    .nav a:hover::after {
      width: 60%;
    }

    /* ESPACIO POR NAV FIJA */
    body {
      padding-top: 80px;
    }

    /* ================= HERO PREMIUM STYLE ================= */

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://images.unsplash.com/photo-1599058917765-a780eda07a3e");
      background-size: cover;
      background-position: center;
      filter: brightness(0.35);
      transform: scale(1.05);
    }

    .hero-content {
      position: relative;
      max-width: 900px;
      padding: 20px;
      z-index: 2;
    }

    .brand {
      font-size: 60px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .name {
      font-size: 22px;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .quote {
      font-size: 20px;
      font-style: italic;
      color: #dcdcdc;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(45deg, #ff3b3b, #ff9a1f);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 80, 0, 0.6);
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .brand {
        font-size: 38px;
      }

      .quote {
        font-size: 16px;
      }

      .nav {
        flex-direction: column;
        gap: 10px;
      }
    }

  </style>
</head>

<body>

<!-- NAV PREMIUM -->
<header class="nav">

  <div>
    <strong>Silvia Body System</strong>
  </div>

  <div>
    <a href="beneficios.html">Beneficios</a>
    <a href="hipertrofia.html">Hipertrofia</a>
    <a href="hibrido.html">Híbrido</a>
    <a href="movilidad.html">Movilidad</a>
    <a href="cardio-abdomen.html">Cardio</a>
  </div>

</header>

<!-- HERO -->
<section class="hero">

  <div class="hero-content">

    <div class="brand">Silvia Body System</div>

    <div class="name">Silvia Martínez Fernández</div>

    <div class="quote">
      “Transforma tu cuerpo. Transforma tu vida.”
    </div>

    <a class="btn" href="beneficios.html">
      Empieza tu transformación
    </a>

  </div>

</section>

</body>
</html>
