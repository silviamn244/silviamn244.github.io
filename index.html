<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silvia Body System</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
        }

        header {
            background-color: #000;
            text-align: center;
            padding: 15px 10px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid #222;
        }

        header span {
            margin: 0 10px;
            color: #c9a646; /* dorado suave */
        }

        .hero {
            height: 100vh;
            background: url('tu-imagen.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 20px;
            font-weight: 300;
            margin: 10px 0 20px 0;
            color: #ccc;
        }

        .frase {
            font-size: 18px;
            font-style: italic;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #c9a646;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #e0b84f;
        }
    </style>
</head>
<body>

    <!-- CABECERA -->
    <header>
        <span>Ejercicio de Fuerza</span> |
        <span>Cardio</span> |
        <span>Abdomen</span> |
        <span>Movilidad</span>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Silvia Body System</h1>
            <h2>Silvia Martinez Fernandez</h2>
            <p class="frase">“Transforma tu cuerpo. Transforma tu vida.”</p>
            <a href="#contacto" class="btn">Empieza tu transformación</a>
        </div>
    </section>

</body>
</html>
